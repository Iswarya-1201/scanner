<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

<h2>Event Entry Scanner</h2>

<div id="reader" style="width:300px;"></div>
<h3 id="result"></h3>

<script>

const resultEl = document.getElementById("result");
const html5QrCode = new Html5Qrcode("reader");

function onScanSuccess(decodedText) {

  html5QrCode.stop();

  fetch("https://script.google.com/macros/s/AKfycbyTD-PeSTsZS35sqleaPPEadV_BDhG8QK9_hT4uuesfDpox7PZR5nD1gGWHNIUx9p8p/exec?qr="
    + encodeURIComponent(decodedText))
    .then(response => response.text())
    .then(data => {

      if (data === "ALLOWED") {
        resultEl.innerHTML = "🟢 Go Inside";
      }
      else if (data === "DUPLICATE") {
        resultEl.innerHTML = "🔴 Go Out (Already Used)";
      }
      else {
        resultEl.innerHTML = "🔴 Not Registered";
      }

    });

}

// 🔥 Start back camera (rear)
html5QrCode.start(
  { facingMode: { exact: "environment" } },
  { fps: 10, qrbox: 250 },
  onScanSuccess
).catch(err => {
  resultEl.innerHTML = "Camera Failed to Start";
  console.log(err);
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body { text-align:center; font-family:Arial; }
#result { font-size:22px; margin-top:20px; }
button { padding:10px; font-size:16px; margin-top:10px; }
</style>

</head>
<body>

<h2>Event Entry Scanner</h2>

<button onclick="startScanner()">Start Scanner</button>

<div id="reader" style="width:300px;margin:auto;margin-top:10px;"></div>
<h3 id="result">Click Start</h3>

<script>

const result = document.getElementById("result");
let scanner;

// 🔥 start only when button clicked (important fix)
function startScanner() {

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {

    if (cameras.length === 0) {
      result.innerHTML = "❌ No Camera Found";
      return;
    }

    // 👉 ALWAYS pick available camera safely
    const cameraId = cameras[cameras.length - 1].id;

    scanner.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

  }).catch(err => {
    result.innerHTML = "❌ Camera Permission Denied";
  });
}

// 🔥 when QR scanned
function onScanSuccess(text) {

  scanner.stop();
  result.innerHTML = "Checking...";

  fetch("https://script.google.com/macros/s/AKfycbzcg0_e351uqNeOkhVk2jyM4162hv59dcfSai8am3P1gLm18TwYJ8f7AenwZgwDT_OyBA/exec?qr=" 
+ encodeURIComponent(text))
    .then(data => {

      if (data === "ALLOWED") {
        result.innerHTML = "🟢 Go Inside";
      } 
      else if (data === "DUPLICATE") {
        result.innerHTML = "🔴 Already Entered";
      } 
      else {
        result.innerHTML = "🔴 Not Registered";
      }

    })
    .catch(() => {
      result.innerHTML = "❌ Network Error";
    });
}

</script>

</body>
</html>
